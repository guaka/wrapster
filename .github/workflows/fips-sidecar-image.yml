name: FIPS sidecar image

on:
  push:
    branches:
      - main
    paths:
      - "fips-sidecar/Dockerfile"
  workflow_dispatch:
    inputs:
      fips_ref:
        description: "FIPS git ref to build"
        required: true
        default: "v0.3.0"
      platforms:
        description: "Docker platforms to build"
        required: true
        default: "linux/amd64"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/guaka/wrapster-fips-sidecar
  DEFAULT_FIPS_REF: v0.3.0
  DEFAULT_PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve FIPS ref
        id: fips
        run: |
          ref="${{ github.event.inputs.fips_ref }}"
          if [ -z "$ref" ]; then
            ref="$DEFAULT_FIPS_REF"
          fi
          platforms="${{ github.event.inputs.platforms }}"
          if [ -z "$platforms" ]; then
            platforms="$DEFAULT_PLATFORMS"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "platforms=$platforms" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: fips-sidecar/Dockerfile
          platforms: ${{ steps.fips.outputs.platforms }}
          push: true
          build-args: |
            FIPS_REF=${{ steps.fips.outputs.ref }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.fips.outputs.ref }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/guaka/wrapster
            org.opencontainers.image.description=Wrapster FIPS sidecar
          cache-from: type=gha
          cache-to: type=gha,mode=max
