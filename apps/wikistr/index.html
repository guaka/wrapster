<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; connect-src 'self' https: wss://relay.guaka.org wss://nip42.trustroots.org; font-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%232f855a%22/%3E%3Cpath d=%22M15 18h6l5 24 6-24h5l6 24 5-24h6l-8 32h-6l-6-22-6 22h-6z%22 fill=%22white%22/%3E%3C/svg%3E">
  <title>wikistr</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #18212f;
      --card-border: #dfe7ef;
      --card-bg: #ffffff;
      --text-muted: #66758a;
      --accent: #2f855a;
      --accent-soft: #eef9f1;
      --danger: #b42318;
      --shadow-sm: 0 1px 2px rgba(20, 30, 43, 0.04);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f6f8fb;
      color: #18212f;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: min(100% - 28px, 1320px);
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .hero {
      margin: 0 0 12px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 14px 18px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
    }

    .hero-content {
      flex: 1;
      min-width: 260px;
    }

    h1 {
      margin: 0;
      font-size: 1.55rem;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--text-muted);
      max-width: 44rem;
      font-size: 0.93rem;
    }

    .hero-session {
      min-width: 220px;
      max-width: 34rem;
      text-align: right;
    }

    .muted {
      color: var(--text-muted);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .small {
      font-size: 0.9rem;
    }

    .error {
      color: var(--danger);
      font-weight: 650;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      border: 1px solid #b7c2d1;
      background: #fff;
      color: #18212f;
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 650;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    button:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    .wiki-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      min-height: 36px;
    }

    .wiki-switch-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #1f4d33;
    }

    .content-columns {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
      gap: 12px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 14px;
      background: var(--card-bg);
      box-shadow: var(--shadow-sm);
      min-width: 0;
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    a {
      color: var(--accent);
    }

    .main-page-content {
      width: 100%;
      min-height: 32rem;
      height: 68vh;
      padding: 12px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      background: #fff;
      overflow: auto;
      line-height: 1.45;
      font-size: 0.95rem;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .main-page-content img {
      max-width: 100%;
      height: auto;
    }

    .recent-list {
      list-style: none;
      margin: 4px 0 0;
      padding: 0;
    }

    .recent-list li {
      margin: 0;
      padding: 10px 0;
      border-top: 1px solid #eef1f5;
    }

    .recent-list li:first-child {
      border-top: none;
      padding-top: 2px;
    }

    .recent-list li > a {
      font-weight: 700;
      text-decoration: none;
    }

    .recent-list li > a:hover {
      text-decoration: underline;
    }

    .rc-edits {
      list-style: none;
      margin: 5px 0 0;
      padding: 0;
    }

    .rc-edit {
      margin: 0;
      padding: 5px 0;
      border-top: 1px dashed #eef1f5;
    }

    .rc-edit:first-child {
      border-top: 0;
    }

    .rc-section {
      display: inline-block;
      font-size: 0.74rem;
      font-weight: 650;
      line-height: 1.4;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(47, 133, 90, 0.2);
      border-radius: 6px;
      padding: 0 6px;
      margin-right: 5px;
    }

    .rc-comment {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .rc-diff {
      text-decoration: none;
      border-bottom: 1px dashed rgba(47, 133, 90, 0.45);
    }

    .site-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--card-border);
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .site-footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .site-footer a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .shell {
        width: 100%;
        padding: 0;
      }

      .hero {
        padding: 12px;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }

      .hero-session {
        text-align: left;
        width: 100%;
        max-width: none;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .content-columns {
        grid-template-columns: 1fr;
      }

      .main-page-content {
        height: 52vh;
      }
    }

    @media (max-width: 680px) {
      .hero {
        flex-direction: column;
        align-items: stretch;
      }

      .hero-session {
        min-width: 0;
      }

      .toolbar {
        width: 100%;
      }

      .toolbar button {
        width: 100%;
      }

      .site-footer {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero" aria-label="Wikistr">
      <div class="hero-content">
        <h1>wikistr</h1>
        <p class="subtitle">Read-only MediaWiki surfaces discovered from public Nostr service adverts.</p>
        <div id="wiki-switcher" class="wiki-switcher" role="group" aria-label="Choose wiki"></div>
      </div>
      <div class="hero-session">
        <div id="status" class="muted">Starting discovery...</div>
        <div class="toolbar">
          <button id="reload-wikis" type="button">Refresh</button>
        </div>
      </div>
    </section>

    <div class="content-columns">
      <section class="card">
        <div class="card-title" hidden>
          <h2 id="main-page-heading" hidden></h2>
        </div>
        <div id="main-page-content" class="main-page-content" aria-live="polite">
          Discovering public wiki adverts...
        </div>
      </section>

      <section class="card">
        <div class="card-title">
          <h2>Recent changes</h2>
        </div>
        <p id="changes-status" class="muted">Waiting for a wiki advert.</p>
        <ul id="recent-changes" class="recent-list"></ul>
      </section>
    </div>

    <footer class="site-footer">
      <a href="#wikistr/TODO">todo</a>
      <span id="build-time" class="footer-meta">Build time: local</span>
      <a class="github-link" href="https://github.com/guaka/wrapster" target="_blank" rel="noopener noreferrer" aria-label="guaka/wrapster on GitHub" title="guaka/wrapster">
        <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true" focusable="false">
          <path fill="currentColor" fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
        </svg>
      </a>
    </footer>
  </main>

  <script src="./index.js"></script>
</body>
</html>
