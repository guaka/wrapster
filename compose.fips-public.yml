name: wrapster-fips-public

services:
  fips-public:
    image: ${FIPS_SIDECAR_IMAGE:-ghcr.io/guaka/wrapster-fips-sidecar:v0.3.0}
    build:
      context: .
      dockerfile: fips-sidecar/Dockerfile
      args:
        FIPS_REF: ${FIPS_REF:-v0.3.0}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      FIPS_NSEC: ${FIPS_PUBLIC_NSEC:-}
      FIPS_NSEC_PATH: /fips-data/nsec
      FIPS_DATA_UID: ${FIPS_DATA_UID:-10001}
      FIPS_DATA_GID: ${FIPS_DATA_GID:-10001}
      FIPS_PEER_NPUB: ${FIPS_HOME_NPUB:-}
      FIPS_PEER_ADDR: ${FIPS_HOME_ADDR:-}
      FIPS_PEER_ALIAS: ${FIPS_HOME_ALIAS:-home-media}
      FIPS_PEER_TRANSPORT: ${FIPS_PEER_TRANSPORT:-udp}
      FIPS_UDP_BIND: ${FIPS_PUBLIC_UDP_BIND:-0.0.0.0:2121}
      FIPS_TCP_BIND: ${FIPS_PUBLIC_TCP_BIND:-0.0.0.0:8443}
      FIPS_TUN_MTU: ${FIPS_TUN_MTU:-1280}
      FIPS_UDP_MTU: ${FIPS_UDP_MTU:-1472}
    ports:
      - "${WRAPSTER_PUBLIC_PORT:-5542}:5542/tcp"
      - "${FIPS_PUBLIC_UDP_PORT:-2121}:2121/udp"
      - "${FIPS_PUBLIC_TCP_PORT:-8443}:8443/tcp"
    volumes:
      - fips-public-data:/fips-data
      - ./fips-sidecar/entrypoint.sh:/entrypoint.sh:ro
      - ./fips-sidecar/resolv.conf:/etc/resolv.conf:ro

  wrapster:
    build:
      context: .
      dockerfile: Dockerfile.wrapster
    network_mode: "service:fips-public"
    depends_on:
      - fips-public
      - strfry
    environment:
      LISTEN_ADDR: ":5542"
      PUBLIC_RELAY_URL: ${PUBLIC_RELAY_URL:-ws://localhost:5542}
      UPSTREAM_RELAY_URL: "ws://127.0.0.1:5543"
      AUTH_CACHE_PATH: "/data/auth-cache.db"
      TRUSTROOTS_NIP05_BASE_URL: "https://www.trustroots.org/.well-known/nostr.json"
      AUTH_CACHE_TTL: "24h"
      AUTH_EVENT_MAX_AGE: "10m"
      ADMIN_PUBKEYS: "${ADMIN_PUBKEYS:-}"
      ADMIN_AUTH_MAX_AGE: "60s"
      FIPS_NSEC_PATH: /fips-data/nsec
      FIPS_HOME_NPUB: "${FIPS_HOME_NPUB:-}"
      FIPS_HOME_ADDR: "${FIPS_HOME_ADDR:-}"
      MEDIA_CONNECTOR_BASE_URL: "${MEDIA_CONNECTOR_BASE_URL:-http://home-media.fips:22000}"
      MEDIA_CONNECTOR_TOKEN: "${MEDIA_CONNECTOR_TOKEN:-}"
      MEDIA_TRANSPORT_LABEL: "fips"
      MEDIA_GRANT_PUBKEYS: "${MEDIA_GRANT_PUBKEYS:-}"
      MEDIA_AUTH_MAX_AGE: "60s"
      TARGETS_CONFIG_PATH: "/conf.toml"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
      PROXY_UPSTREAM_TIMEOUT: "15s"
      PROXY_MAX_BODY_BYTES: "10485760"
    volumes:
      - wrapster-data:/data
      - fips-public-data:/fips-data
      - ./conf.toml:/conf.toml:ro
      - ./fips-sidecar/resolv.conf:/etc/resolv.conf:ro

  strfry:
    image: ghcr.io/hoytech/strfry:latest
    network_mode: "service:fips-public"
    depends_on:
      - fips-public
    volumes:
      - ./wrapster/strfry/strfry.conf:/etc/strfry.conf:ro
      - strfry-data:/app/strfry-db
      - ./fips-sidecar/resolv.conf:/etc/resolv.conf:ro

volumes:
  fips-public-data:
  wrapster-data:
  strfry-data:
